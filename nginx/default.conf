server {
    listen 80;
    server_name localhost;

    location / {
        proxy_pass http://php; # Forward requests to the Apache container
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location ~ \.php$ {
        proxy_pass http://php; # Also forward PHP requests to the Apache container
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    # ... other NGINX configuration for static files or additional settings ...
}
