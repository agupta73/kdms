# Local stack: http://localhost/kdms/  (maps host 80 → container 8080; change to 8080:8080 if port 80 is busy)
# Copy .env.example to .env and set MySQL (host.docker.internal:3306 if DB runs on the host Mac).
version: "3.9"
services:
  web:
    build: .
    image: kdms:local
    ports:
      - "80:8080"
    env_file:
      - .env
    
    environment:
      PORT: 8080
      # Serve app at /kdms (see docker/kdms-vhost-prefix.conf). Production images omit KDMS_APACHE_USE_PREFIX.
      KDMS_APACHE_USE_PREFIX: "1"
      WEBROOT_URL: http://localhost/kdms/
      API_BASE_URL: http://localhost/kdms/api/
      # Loopback + in-container path (must match KDMS_APACHE_USE_PREFIX URL).
      KDMS_INTERNAL_ORIGIN: http://127.0.0.1:8080/kdms
      # Override .env for Docker → host MySQL (127.0.0.1 inside the container is wrong).
      KDMS_DB_HOST: host.docker.internal:3306
      # Optional: leave unset to use /kdms/ in legacy URL construction from HTTP_HOST
      # KDMS_PATH_SEGMENT: "kdms"
      KDMS_EVENT_ID: "2025JB"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    # Uncomment to pin DB in compose instead of a host:
    # depends_on:
    #   - db
