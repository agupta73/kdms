# Build and push the kdms image to Artifact Registry. Deploy to Cloud Run is out of scope
# (manual apply from this repo’s `terraform/` folder or `gcloud run services update`).

name: Build and push to Artifact Registry

on:
  push:
    branches:
      - main
  workflow_dispatch: {}

permissions:
  contents: read
  id-token: write

env:
  # Kainchi Cloud (K1)
  PROJECT_ID: project-12f4b54b-d692-4583-83b
  GAR_REGION: asia-south1
  GAR_REPOSITORY: apps
  IMAGE_NAME: kdms

jobs:
  build-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Image URI base
        id: meta
        run: |
          SHORT_SHA=$(echo "${GITHUB_SHA}" | cut -c1-7)
          URI="${GAR_REGION}-docker.pkg.dev/${PROJECT_ID}/${GAR_REPOSITORY}/${IMAGE_NAME}"
          echo "short=${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "uri=${URI}" >> "$GITHUB_OUTPUT"

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          project_id: ${{ env.PROJECT_ID }}
          service_account: ci-builder-kdms@project-12f4b54b-d692-4583-83b.iam.gserviceaccount.com
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Docker login (Artifact Registry)
        run: gcloud auth configure-docker "${GAR_REGION}-docker.pkg.dev" --quiet

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        id: buildpush
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.uri }}:${{ steps.meta.outputs.short }}
            ${{ steps.meta.outputs.uri }}:branch-main

      # Ensures the manifest exists where Terraform expects. Digests from GHCR, another GCP
      # project, or a local-only build will not validate here.
      - name: Verify image in Artifact Registry
        env:
          URI: ${{ steps.meta.outputs.uri }}
          DIGEST: ${{ steps.buildpush.outputs.digest }}
        run: |
          set -euo pipefail
          if [ -z "$DIGEST" ]; then echo "::error::Build did not emit a digest."; exit 1; fi
          DIGEST_NORM="$DIGEST"
          case "$DIGEST_NORM" in sha256:*);; *) DIGEST_NORM="sha256:${DIGEST_NORM}";; esac
          REF="${URI}@${DIGEST_NORM}"
          echo "::notice::terraform: image_digest = \"${DIGEST_NORM}\""
          echo "Full ref: ${REF}"
          gcloud artifacts docker images describe "${REF}" --format='value(name)' >/dev/null
          echo "OK — manifest present in ${PROJECT_ID} Artifact Registry."
