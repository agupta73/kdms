# Patched in Docker image: VirtualHost is rewritten to *:${PORT} at build time; Listen comes from entrypoint.
<VirtualHost *:80>
	DocumentRoot /var/www/kdms
	<Directory /var/www/kdms>
		Options Indexes FollowSymLinks
		AllowOverride All
		Require all granted
	</Directory>
	ErrorLog ${APACHE_LOG_DIR}/error.log
	CustomLog ${APACHE_LOG_DIR}/access.log combined
</VirtualHost>
