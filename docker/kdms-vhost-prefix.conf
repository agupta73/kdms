# Mount the app at http://<host>:<port>/kdms/ (local Docker). Entrypoint sets VirtualHost *:$PORT.
# Cloud Run / production uses docker/kdms-vhost.conf (app at site root) instead.
<VirtualHost *:80>
	ServerName localhost
	DocumentRoot /var/www/html
	RedirectMatch "^/$" "/kdms/"
	Alias /kdms /var/www/kdms
	Alias /favicon.ico /var/www/kdms/assets/img/camera.ico
	<Directory /var/www/kdms>
		Options Indexes FollowSymLinks
		AllowOverride All
		Require all granted
		DirectoryIndex index.php index.html
	</Directory>
	ErrorLog ${APACHE_LOG_DIR}/error.log
	CustomLog ${APACHE_LOG_DIR}/access.log combined
</VirtualHost>
